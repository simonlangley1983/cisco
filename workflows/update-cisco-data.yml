name: Update Cisco share price data

on:
  schedule:
    - cron: "15 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cisco-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Build Cisco JSON
        run: |
          python scripts/build_cisco_json.py

      - name: Confirm peer data exists
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/cisco_daily.json")
          data = json.loads(path.read_text())

          print("Top-level keys:", list(data.keys()))
          print("Peer symbols:", list(data.get("peer_records", {}).keys()))

          if "peer_records" not in data:
              raise SystemExit("ERROR: peer_records missing from cisco_daily.json")

          if not data["peer_records"]:
              raise SystemExit("ERROR: peer_records exists but is empty")

          for symbol, rows in data["peer_records"].items():
              print(symbol, "records:", len(rows))
          PY

      - name: Commit updated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/cisco_daily.json

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "Update Cisco share price data"
            git push
          fi
